<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Logged Out — Kings & Queens Restaurant and Lounge</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png">

  <!-- PWA Meta -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffc942">
  <link rel="apple-touch-icon" href="assets/icons/icon-512.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@400;500;600&family=Inter:wght@400;500&display=swap">

  <link rel="stylesheet" href="styles/styles.css">
  <link rel="stylesheet" href="styles/components.css">

  <meta name="robots" content="noindex, nofollow">
</head>

<body class="auth-page">
  <main id="main-content" class="auth-main logout-main">
    <div class="logout-container">
      <a href="index.html" class="logout-logo">
        <img src="assets/icons/icon-512.png" alt="Kings & Queens logo" width="80" height="80">
      </a>

      <div class="logout-content">
        <!-- Success Icon -->
        <div class="logout-icon">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </div>

        <h1>You've Been <span class="text-gold">Logged Out</span></h1>
        <p class="logout-message">Thank you for visiting Kings & Queens. We hope to see you again soon!</p>

        <!-- Actions -->
        <div class="logout-actions">
          <a href="login.html" class="btn btn-primary btn-lg">
            <span>Sign In Again</span>
          </a>
          <a href="index.html" class="btn btn-outline btn-lg">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/>
            </svg>
            <span>Go Home</span>
          </a>
        </div>

        <!-- Quick Links -->
        <div class="logout-links">
          <p>While you're here, check out:</p>
          <div class="quick-links">
            <a href="menu.html">Our Menu</a>
            <a href="reservations.html">Make a Reservation</a>
            <a href="events.html">Private Events</a>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>

</html>
